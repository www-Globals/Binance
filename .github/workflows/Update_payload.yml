name: Update Payload

on:
  workflow_dispatch:
  schedule:
    - cron: '0 3 * * *'  # Runs at 3:00 AM daily

jobs:
  update:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      
      - name: Update payload.java
        run: |
          # Download latest payload from Render
          curl -o payload.java https://simiyu-payload.onrender.com/payload.java
          
          # Check if file changed
          if git diff --quiet payload.java; then
            echo "No changes detected"
          else
            git config user.name "GitHub Actions"
            git config user.email "actions@github.com"
            git add payload.java
            git commit -m "Auto-update payload.java [skip ci]"
            git push
          fi
      
      - name: Notify update
        run: |
          curl -X POST -H "Content-Type: application/json" \
            -d '{"content": "🔄 Payload updated successfully at $(date)"}' \
            https://api.telegram.org/bot8585104821:AAFXZn3g7QG9NsCmLmZuyfviQkPddOYMJzc/sendMessage?chat_id=8468538314
