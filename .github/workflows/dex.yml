name: Build Payload DEX

on:
  push:
    paths:
      - 'Payload.java'
  workflow_dispatch:

jobs:
  compile:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Accept Android licenses
        run: yes | sdkmanager --licenses

      - name: Install Android build tools
        run: sdkmanager "platform-tools" "platforms;android-34" "build-tools;34.0.0"

      - name: Compile Payload to DEX
        run: |
          ANDROID_HOME=/usr/local/lib/android/sdk
          ANDROID_JAR=$ANDROID_HOME/platforms/android-34/android.jar

          # Compile Java to .class
          javac -cp $ANDROID_JAR Payload.java

          # Convert .class to .dex
          $ANDROID_HOME/build-tools/34.0.0/dx --dex --output=payload.dex Payload.class

          echo "✅ payload.dex created"

      - name: Upload payload.dex
        uses: actions/upload-artifact@v4
        with:
          name: payload-dex
          path: payload.dex
