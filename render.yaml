envVarGroups:
  - name: Binance   # <-- your environment group name
    envVars:
      - key: BINANCE_API_KEY
        sync: false
      - key: BINANCE_SECRET
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_KEY
        sync: false
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: ADMIN_CHAT_ID
        sync: false
      - key: PROXY_URL
        sync: false

services:
  - type: web
    name: arb-bot
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: python arb_bot.py
    plan: free
    envGroup: Binance   # references the group
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
